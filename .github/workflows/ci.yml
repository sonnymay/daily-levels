name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & test (iOS Simulator)
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Validate App Store release inputs
        run: ./AppStore/validate_release.sh 1.1 7

      - name: Test simulator selection
        run: python3 -m unittest scripts/test_resolve_ios_simulator.py

      - name: Select iOS Simulator
        id: simulator
        run: |
          simulator_id="$(./scripts/resolve_ios_simulator.py)"
          echo "id=$simulator_id" >> "$GITHUB_OUTPUT"

      - name: Build & run unit tests
        run: |
          xcodebuild -project DailyLevels.xcodeproj \
            -scheme DailyLevels \
            -destination "platform=iOS Simulator,id=${{ steps.simulator.outputs.id }}" \
            -skipMacroValidation \
            CODE_SIGNING_ALLOWED=NO \
            test
