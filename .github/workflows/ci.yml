name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    name: Build & test (iOS Simulator)
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Validate App Store release inputs
        run: ./AppStore/validate_release.sh 1.1 7

      - name: Build & run unit tests
        run: |
          xcodebuild -project DailyLevels.xcodeproj \
            -scheme DailyLevels \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -skipMacroValidation \
            CODE_SIGNING_ALLOWED=NO \
            test
